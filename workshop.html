<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1f2e" />
  <link rel="icon" href="/icons/icon-192.png" type="image/png" />
  <title>TowerDive — Workshop</title>
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="stylesheet" href="/src/workshop.css" />
</head>
<body>
  <div id="app">
    <canvas id="scene"></canvas>

    <div id="workshop-topbar">
      <a id="workshop-back" href="./">&larr; back to game</a>
      <span id="workshop-title">Workshop</span>
      <div id="workshop-actions">
        <select id="skybox-select" title="Sky"></select>
        <button id="action-save" title="Save to this browser">Save</button>
        <button id="action-export" title="Download as JSON">Export</button>
        <button id="action-import" title="Load a JSON map file">Import</button>
        <input id="action-import-input" type="file" accept="application/json" hidden />
        <button id="action-clear" title="Clear the whole map">Clear</button>
        <button id="action-explore" title="Walk around the map you're building">&#128694; Explore</button>
      </div>
    </div>

    <aside id="palette">
      <div id="palette-tool-row">
        <button class="palette-item palette-tool" data-name="__erase" title="Erase">&#129529; Erase</button>
      </div>
      <div id="palette-categories"></div>
    </aside>

    <div id="brush-status">
      <span id="brush-status-name">no tool selected</span>
      <span id="brush-status-detail"></span>
    </div>

    <div id="workshop-hint">
      left-click: place/erase &middot; right-drag: orbit &middot; middle-drag: pan &middot; scroll: zoom
      &middot; R: rotate &middot; [ ]: stack offset &middot; Esc: deselect
    </div>

    <div id="explore-hint" hidden>WASD move &middot; mouse look &middot; Shift sprint &middot; Space jump &middot; Ctrl/C crouch/slide &middot; Z prone &middot; LMB fire &middot; RMB ADS &middot; R reload &middot; ESC exit</div>
  </div>
  <script type="module" src="/src/workshop.js"></script>
</body>
</html>
