<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1f2e" />
  <link rel="icon" href="/icons/icon-192.png" type="image/png" />
  <title>TowerDive — Model Viewer</title>
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="stylesheet" href="/src/viewer.css" />
</head>
<body>
  <div id="app">
    <canvas id="scene"></canvas>
    <div id="viewer-hud">
      <a id="viewer-back" href="./">&larr; back to game</a>
      <div id="viewer-name">loading&hellip;</div>
      <div id="viewer-counter"></div>
    </div>
    <button id="viewer-prev" class="viewer-nav" aria-label="Previous model">&#8249;</button>
    <button id="viewer-next" class="viewer-nav" aria-label="Next model">&#8250;</button>
  </div>
  <script type="module" src="/src/viewer.js"></script>
</body>
</html>
