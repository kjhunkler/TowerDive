<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1f2e" />
  <link rel="icon" href="/icons/icon-192.png" type="image/png" />
  <title>TowerDive</title>
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="stylesheet" href="/src/menu.css" />
</head>
<body>
  <div id="app">
    <canvas id="scene"></canvas>
    <div id="menu">
      <div id="menu-panel">
        <h1 id="menu-title">TowerDive <span id="hud-version"></span></h1>

        <label id="menu-name-row">
          <span>Name</span>
          <input id="menu-name" type="text" maxlength="24" placeholder="pick a name" autocomplete="nickname" />
        </label>

        <div id="menu-buttons">
          <button id="menu-create" class="menu-button">&#128296; Create New Map</button>
          <button id="menu-load" class="menu-button">&#128194; Load Saved Map</button>
          <button id="menu-host" class="menu-button menu-button-primary">&#128225; Host</button>
        </div>

        <div id="menu-join">
          <div id="menu-join-header">
            <span>Join a game</span>
            <button id="menu-autojoin" disabled>&#9889; Auto Join</button>
          </div>
          <div id="menu-sessions">
            <div class="menu-empty">Searching for hosts&hellip;</div>
          </div>
        </div>

        <div id="menu-footer">
          <a href="./viewer.html">browse models</a>
        </div>
      </div>
    </div>
    <div id="library" hidden>
      <div id="library-panel">
        <div id="library-header">
          <span id="library-title">Your maps</span>
          <button id="library-close" title="Close" aria-label="Close">&times;</button>
        </div>
        <div id="library-list"></div>
        <div id="library-footer">
          <button id="library-import">&#8681; Import map file</button>
          <input id="library-import-input" type="file" accept="application/json" hidden />
          <button id="library-new" hidden>&#128296; New empty map</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/src/menu.js"></script>
</body>
</html>
